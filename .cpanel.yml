---
deployment:
  tasks:
    - export DEPLOYPATH=/home/sheateat/public_html/
    - /bin/cp -f *.html $DEPLOYPATH
    - /bin/cp -f .htaccess $DEPLOYPATH
    - /bin/cp -f robots.txt $DEPLOYPATH
    - /bin/cp -f sitemap.xml $DEPLOYPATH
    - /bin/cp -f site.webmanifest $DEPLOYPATH
    - /bin/rm -rf ${DEPLOYPATH}assets
    - /bin/cp -R assets $DEPLOYPATH
