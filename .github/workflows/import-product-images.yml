name: Import product images

on:
  push:
    branches:
      - feature/product-catalog-content
    paths:
      - '.github/workflows/import-product-images.yml'

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode product images
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/images/products
          base64 --decode assets/images/products/product-images.tgz.b64 > /tmp/product-images.tgz
          tar -xzf /tmp/product-images.tgz -C assets/images/products
          rm -f assets/images/products/product-images.tgz.b64
          rm -f assets/images/products/*.b64
      - name: Commit product images to the feature branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main --depth=1
          git checkout origin/main -- .github/workflows/import-product-images.yml
          git add assets/images/products .github/workflows/import-product-images.yml
          if git diff --cached --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git commit -m "Import optimized product photography"
          git push origin "HEAD:${GITHUB_REF_NAME}"
