name: Import product images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Decode product images
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64, io, tarfile

          source = Path('assets/images/products/product-images.tgz.b64')
          text = ''.join(source.read_text(encoding='utf-8').split())
          text += '=' * (-len(text) % 4)
          archive = base64.b64decode(text, validate=False)

          destination = Path('assets/images/products')
          destination.mkdir(parents=True, exist_ok=True)
          with tarfile.open(fileobj=io.BytesIO(archive), mode='r:gz') as tar:
              tar.extractall(destination)

          source.unlink(missing_ok=True)
          (destination / 'coconut-shampoo-1.webp.b64').unlink(missing_ok=True)
          PY

      - name: Verify product images
        shell: bash
        run: |
          set -euo pipefail
          required=(
            coconut-shampoo-1.webp
            coconut-shampoo-2.webp
            jojoba-oil-shampoo.webp
            moroccan-argan-oil-shampoo.webp
            tea-tree-extract-conditioner.webp
            rosemary-extract-conditioner.webp
            shea-butter-conditioner.webp
            moroccan-argan-oil-conditioner.webp
          )
          for file in "${required[@]}"; do
            test -s "assets/images/products/$file"
          done

      - name: Commit product images
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/images/products
          if git diff --cached --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git commit -m "Import product photography"
          git push origin main
