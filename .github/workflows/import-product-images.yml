name: Import product images

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/import-product-images.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode product images
        run: |
          mkdir -p assets/images/products
          base64 -d assets/images/products/product-images.tgz.b64 > /tmp/product-images.tgz
          tar -xzf /tmp/product-images.tgz -C assets/images/products
          rm -f assets/images/products/product-images.tgz.b64
          rm -f assets/images/products/coconut-shampoo-1.webp.b64
      - name: Commit product images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/images/products
          if git diff --cached --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git commit -m "Import product photography"
          git push
